name: Build and release

# Push a version tag to build standalone single-file binaries for every OS and
# attach them to the GitHub release:  git tag v3.1 && git push origin v3.1
#
# Per-OS matrix: ReadyToRun (fast cold start) must be compiled on a matching host.
# macOS needs IncludeAllContentForSelfExtract — with only IncludeNativeLibrariesForSelfExtract
# the SDK leaves libAvaloniaNative/libSkiaSharp/libHarfBuzzSharp OUTSIDE the single file,
# which crashes the bare binary on launch.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rids: 'win-x64'
          - os: ubuntu-latest
            rids: 'linux-x64'
          - os: macos-latest
            rids: 'osx-x64 osx-arm64'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Publish (single-file, self-contained, ReadyToRun)
        shell: bash
        run: |
          cd src/DiskImager.App
          for rid in ${{ matrix.rids }}; do
            echo "== publishing $rid =="
            extra=""
            case "$rid" in
              osx-*) extra="-p:IncludeAllContentForSelfExtract=true" ;;
              *)     extra="-p:IncludeNativeLibrariesForSelfExtract=true" ;;
            esac
            dotnet publish -c Release -r $rid --self-contained true \
              -p:PublishSingleFile=true -p:PublishReadyToRun=true $extra \
              -p:EnableCompressionInSingleFile=true -p:DebugType=none \
              -o "$GITHUB_WORKSPACE/out/$rid"
            # fail the build if any native library escaped the single file
            leftovers=$(find "$GITHUB_WORKSPACE/out/$rid" -name '*.dylib' -o -name '*.so' -o -name '*.dll' | grep -v 'DiskImager' || true)
            if [ -n "$leftovers" ]; then echo "loose native libs: $leftovers"; exit 1; fi
          done

      - name: Gate on selftest (published binary)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # GUI-subsystem exe: & does not wait — Start-Process does
          $p = Start-Process "$env:GITHUB_WORKSPACE/out/win-x64/DiskImager.exe" -ArgumentList '--selftest' -Wait -PassThru -NoNewWindow
          exit $p.ExitCode

      - name: Gate on selftest (published binary, linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x "$GITHUB_WORKSPACE/out/linux-x64/DiskImager"
          "$GITHUB_WORKSPACE/out/linux-x64/DiskImager" --selftest

      - name: Gate on selftest (published binary, macos)
        if: matrix.os == 'macos-latest'
        run: |
          rid=osx-x64; [ "$(uname -m)" = "arm64" ] && rid=osx-arm64
          chmod +x "$GITHUB_WORKSPACE/out/$rid/DiskImager"
          "$GITHUB_WORKSPACE/out/$rid/DiskImager" --selftest

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.os }}
          path: out/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: out
          merge-multiple: true

      - name: Collect + checksum
        run: |
          cd out
          mv win-x64/DiskImager.exe   DiskImager-windows-x64.exe
          mv linux-x64/DiskImager     DiskImager-linux-x64
          mv osx-x64/DiskImager       DiskImager-macos-x64
          mv osx-arm64/DiskImager     DiskImager-macos-arm64
          chmod +x DiskImager-linux-x64 DiskImager-macos-x64 DiskImager-macos-arm64
          sha256sum DiskImager-windows-x64.exe DiskImager-linux-x64 DiskImager-macos-x64 DiskImager-macos-arm64 > SHA256SUMS.txt
          ls -la

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/DiskImager-windows-x64.exe
            out/DiskImager-linux-x64
            out/DiskImager-macos-x64
            out/DiskImager-macos-arm64
            out/SHA256SUMS.txt
          body: |
            Standalone single-file builds — no installer, no .NET required.

            - **Windows:** download `DiskImager-windows-x64.exe`, then right-click → Run as administrator.
            - **macOS:** download `DiskImager-macos-arm64` (Apple Silicon) or `DiskImager-macos-x64` (Intel), `chmod +x`, then run with `sudo`.
            - **Linux:** download `DiskImager-linux-x64`, `chmod +x`, then run with `sudo`.

            Verify with `SHA256SUMS.txt`.
